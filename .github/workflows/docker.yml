name: Docker Build & Push

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - run: yarn install --immutable
      - run: yarn lint
      - name: Security audit
        run: yarn npm audit --all --severity high --environment production
      - name: Run tests
        run: yarn test
      - run: cd apps/api && npx tsc --noEmit
      - run: cd apps/client && npx tsc --noEmit
      - run: yarn build

  smoke-e2e:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
      - run: yarn install --immutable
      - name: Write CI env file
        run: |
          cat <<'EOF' > .env
          POSTGRES_USER=thymely
          POSTGRES_PASSWORD=thymely
          POSTGRES_DB=thymely
          DATABASE_URL=postgresql://thymely:thymely@thymely_postgres:5432/thymely
          SECRET=dGhpcyBpcyBhIHRlc3Qgc2VjcmV0IGtleSBmb3IgQ0k=
          THYMELY_BOOTSTRAP_PASSWORD=admin
          DATA_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          NODE_ENV=production
          PUBLIC_APP_URL=http://localhost:3000
          CORS_ORIGIN=http://localhost:3000
          TRUST_PROXY=false
          COOKIE_SECURE=false
          LOG_LEVEL=info
          ALLOW_EXTERNAL_REGISTRATION=true
          ALLOW_PUBLIC_TICKETS=true
          EOF
      - name: Start local stack
        run: docker compose -f docker-compose.local.yml up -d --build
      - name: Wait for services
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:5003/ | grep -q '"healthy":true'; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:3000/auth/login > /dev/null
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        run: yarn test:e2e
        env:
          CI: true
          E2E_BASE_URL: http://localhost:3000
          E2E_ADMIN_EMAIL: admin@admin.com
          E2E_ADMIN_PASSWORD: admin
      - name: Collect docker logs
        if: always()
        run: docker compose -f docker-compose.local.yml logs --no-color > docker-compose.log
      - name: Tear down local stack
        if: always()
        run: docker compose -f docker-compose.local.yml down -v
      - name: Upload smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-e2e-artifacts
          path: |
            docker-compose.log
            playwright-report/
            test-results/
          retention-days: 7

  build:
    needs: [validate, smoke-e2e]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name lowercase
        id: repo
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve app version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=nightly-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=registry,ref=${{ steps.repo.outputs.image }}:buildcache-${{ matrix.runner }}
          cache-to: type=registry,ref=${{ steps.repo.outputs.image }}:buildcache-${{ matrix.runner }},mode=max
          outputs: type=image,name=${{ steps.repo.outputs.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set image name lowercase
        id: repo
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.image }}
          tags: |
            type=raw,value=nightly,enable={{is_default_branch}}
            type=sha,prefix=sha-,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.repo.outputs.image }}@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ steps.repo.outputs.image }}:${{ steps.meta.outputs.version }}
