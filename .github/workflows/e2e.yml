name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # CI-only test values — not used in production
  DATABASE_URL: postgresql://thymely:thymely@localhost:5432/thymely
  SECRET: dGhpcyBpcyBhIHRlc3Qgc2VjcmV0IGtleSBmb3IgQ0k=
  THYMELY_BOOTSTRAP_PASSWORD: admin

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: thymely
          POSTGRES_PASSWORD: thymely
          POSTGRES_DB: thymely
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thymely -d thymely"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate Prisma client
        run: cd apps/api && npx prisma generate

      - name: Run migrations & seed
        run: cd apps/api && npx prisma migrate deploy && npx prisma db seed

      - name: Build API
        run: cd apps/api && npx tsc

      - name: Build client
        run: cd apps/client && npx next build --webpack

      - name: Start API
        run: cd apps/api && node dist/main.js &
        env:
          NODE_ENV: production

      - name: Start client
        run: cd apps/client && npx next start &
        env:
          NODE_ENV: production

      - name: Wait for services
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:5003/ | grep -q "healthy"; then
              echo "API ready"
              break
            fi
            sleep 2
          done

          echo "Waiting for client..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/auth/login | grep -q "200"; then
              echo "Client ready"
              break
            fi
            sleep 2
          done

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: yarn test:e2e
        env:
          CI: true
          E2E_BASE_URL: http://localhost:3000
          E2E_ADMIN_EMAIL: admin@admin.com
          E2E_ADMIN_PASSWORD: admin

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
