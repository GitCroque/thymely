services:
  thymely_postgres:
    container_name: thymely_postgres
    image: postgres:17
    restart: always
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  thymely_init:
    container_name: thymely_init
    image: ghcr.io/gitcroque/thymely:latest
    restart: "no"
    env_file: .env
    depends_on:
      thymely_postgres:
        condition: service_healthy
    command:
      - "sh"
      - "-c"
      - |
        if [ -z "$$POSTGRES_USER" ] || [ -z "$$POSTGRES_PASSWORD" ]; then
          echo "[FATAL] POSTGRES_USER and POSTGRES_PASSWORD must be set in .env"
          exit 1
        fi
        if [ -z "$$SECRET" ]; then
          echo "[FATAL] SECRET must be set in .env"
          exit 1
        fi
        cd apps/api && yarn bootstrap:init
    environment:
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: thymely_postgres
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@thymely_postgres:5432/${POSTGRES_DB:-thymely}
      SECRET: ${SECRET}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-}
      THYMELY_BOOTSTRAP_PASSWORD: ${THYMELY_BOOTSTRAP_PASSWORD:-}
    networks:
      - backend

  thymely:
    container_name: thymely
    image: ghcr.io/gitcroque/thymely:latest
    env_file: .env
    ports:
      - 3000:3000
      - 3002:3002
      - 5003:5003
    restart: always
    depends_on:
      thymely_postgres:
        condition: service_healthy
      thymely_init:
        condition: service_completed_successfully
    environment:
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: thymely_postgres
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@thymely_postgres:5432/${POSTGRES_DB:-thymely}
      SECRET: ${SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-}
      ALLOW_EXTERNAL_REGISTRATION: ${ALLOW_EXTERNAL_REGISTRATION:-true}
      ALLOW_PUBLIC_TICKETS: ${ALLOW_PUBLIC_TICKETS:-false}
      SESSION_BIND_IP: ${SESSION_BIND_IP:-false}
      HOSTNAME: "0.0.0.0"
    networks:
      - frontend
      - backend

networks:
  frontend:
  backend:
    internal: true

volumes:
  pgdata:
