version: "3.1"

services:
  thymely_postgres:
    container_name: thymely_postgres
    image: postgres:latest
    restart: always
    volumes:
      - pgdata_live:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: thymely
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: thymely

  thymely:
    container_name: thymely
    image: gitcroque/thymely:latest
    ports:
      - 1000:3000
      - 1001:5003
# If running via Docker on a hypervisor, enable DNS.
#    dns:
#      - 1.1.1.1
#      - 8.8.8.8
    restart: always
    depends_on:
      - thymely_postgres
    environment:
      DB_USERNAME: "thymely"
      DB_PASSWORD: "12345"
      DB_HOST: "thymely_postgres"
      SECRET: 'thymely4life'

volumes:
 pgdata_live:
