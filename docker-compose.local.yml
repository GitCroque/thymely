version: "3.1"

services:
  thymely_postgres:
    container_name: thymely_postgres
    image: postgres:latest
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: thymely
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: thymely

  thymely:
    container_name: thymely
    build: "."
    ports:
      - 3000:3000
      - 5001:5003
    restart: always
    depends_on:
      - thymely_postgres
    environment:
      DB_USERNAME: "thymely"
      DB_PASSWORD: "1234"
      DB_HOST: "thymely_postgres"
      SECRET: 'thymely4life'
      
volumes: 
 pgdata:
